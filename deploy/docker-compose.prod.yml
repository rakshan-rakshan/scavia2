# Production deployment for Aria — run on the droplet.
#
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# Both services use host networking on purpose: WebRTC audio is UDP on
# ephemeral ports, and host networking lets the agent bind the droplet's real
# public IP so media actually reaches the browser (the classic "connects but
# silent" Docker trap is avoided this way).
services:
  aria:
    build:
      context: ..
      dockerfile: Dockerfile
    image: aria-voice:latest
    network_mode: host
    env_file:
      - ../.env
    environment:
      # App HTTP binds localhost only; Caddy fronts it with TLS. WebRTC media
      # UDP is separate and bound on all interfaces by aiortc.
      HOST: "127.0.0.1"
      PORT: "7860"
    restart: unless-stopped

  caddy:
    image: caddy:2
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
